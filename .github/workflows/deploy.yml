name: 🚀 Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Node Dependencies
        run: npm ci

      - name: 🔨 Build Production Assets
        run: npm run build

      - name: 🚀 Deploy to Hostinger via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            echo "📂 Navigating to project..."
            cd /home/u125397265/domains/seashell-finch-209887.hostingersite.com/public_html

            echo "⬇️  Pulling latest code..."
            git pull origin main

            echo "📦 Installing Composer dependencies..."
            composer install --optimize-autoloader --no-dev --quiet

            echo "⚙️  Clearing & caching config..."
            php artisan config:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            echo "🗄️  Running migrations..."
            php artisan migrate --force

            echo "🔒 Setting permissions..."
            chmod -R 775 storage bootstrap/cache

            echo "✅ Deployment complete!"

      - name: 📤 Upload Build Assets via SCP (Fallback)
        if: failure()
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          source: "public/build/*"
          target: "/home/u125397265/domains/seashell-finch-209887.hostingersite.com/public_html/public/build/"
          strip_components: 2
